services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    image: ${DOCKERHUB_USERNAME:-devops-playground}/project-backend:latest
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://localhost:5432/db}
      - SECRET_KEY=${SECRET_KEY:-local_development_secret}
    expose:
      - "8000"

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=/api
    image: ${DOCKERHUB_USERNAME:-devops-playground}/project-frontend:latest
    restart: always

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
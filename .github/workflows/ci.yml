name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/checkout@v4
        # (Optional if you want to run tests without Docker for speed)

      - name: Build and Run Tests
        run: |
          docker compose build
          touch backend/coverage.xml
          docker compose run \
            -v $(pwd)/backend/coverage.xml:/app/coverage.xml \
            backend python -m pytest --cov=app --cov-report=xml:coverage.xml

          sed -i 's|<source>.*</source>|<source>./backend/app</source>|g' backend/coverage.xml
          sed -i 's|filename="|filename="backend/app/|g' backend/coverage.xml

          echo "--- CHECK XML AFTER SED ---"
          head -n 25 backend/coverage.xml

      # For sonarcloud integration, we can upload the coverage report as an artifact

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
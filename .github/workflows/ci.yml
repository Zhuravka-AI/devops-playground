name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        # (Optional if you want to run tests without Docker for speed)

      - name: Build and Run Tests in Docker
        run: |
          docker compose build
          docker compose run backend python -m pytest --cov=app --cov-report=xml

      # For sonarcloud integration, we can upload the coverage report as an artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
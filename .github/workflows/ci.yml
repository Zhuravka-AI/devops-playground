name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend: ['backend/**']
            frontend: ['frontend/**']

  backend-test:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Backend image (for testing)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: backend-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          no-cache: true
      - name: Run Backend Tests
        run: |
          rm -f backend/coverage.xml
          touch backend/coverage.xml
          docker run --rm \
            -v $(pwd)/backend/coverage.xml:/app/coverage.xml \
            backend-test:latest python -m pytest --cov=app --cov-report=xml:coverage.xml
      - name: SonarCloud Scan (Backend)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.sources=backend/app
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml

  frontend-test:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Test
        run: cd frontend && npm run coverage
      - name: SonarCloud Scan (Frontend)
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.sources=frontend/src
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
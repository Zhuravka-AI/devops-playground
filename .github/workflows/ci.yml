name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.yml'
            frontend:
              - 'frontend/**'
              - 'docker-compose.yml'

  backend-test:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Run Backend Tests
        run: |
          docker compose build backend
          touch backend/coverage.xml
          docker compose run \
            -v $(pwd)/backend/coverage.xml:/app/coverage.xml \
            backend python -m pytest --cov=app --cov-report=xml:coverage.xml
          
          sed -i 's|<source>.*</source>|<source>./</source>|g' backend/coverage.xml
          sed -i 's|filename="|filename="backend/app/|g' backend/coverage.xml
      
      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

      - name: SonarCloud Scan (Backend)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.sources=backend/app
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml

  frontend-test:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Test
        run: |
          cd frontend
          npm ci
          npm run coverage

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info

      - name: SonarCloud Scan (Frontend)
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.sources=frontend/src
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

  deploy-backend:
    needs: [backend-test, changes]
    if: |
      always() && github.ref == 'refs/heads/main' && 
      needs.changes.outputs.backend == 'true' &&
      (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build/Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/project-backend:latest
      - name: Trigger Render Backend
        run: curl -f ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}

  deploy-frontend:
    needs: [frontend-test, changes]
    if: |
      always() && github.ref == 'refs/heads/main' && 
      needs.changes.outputs.frontend == 'true' &&
      (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build/Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/project-frontend:latest
          build-args: |
            VITE_API_URL=https://project-backend-latest-jtvw.onrender.com
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
      - name: Trigger Render Frontend
        run: curl -f ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}